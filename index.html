<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generation of Miracles — Arcade Kuroko no Basket</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --court:#0b0f17;
    --court-line:#161e2c;
    --seirin-red:#d6321f;
    --seirin-red-bright:#ef3a23;
    --kiseki-gold:#e8b13d;
    --touou-blue:#1d4ed8;
    --paper:#f4ede0;
    --ghost:#7d8aa3;
    --success:#3f9c5f;
    --lock:#3a4256;
    --panel-bg: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.01));
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'Inter',sans-serif;
    background:
      radial-gradient(circle at 15% -5%, rgba(214,50,31,0.10), transparent 40%),
      radial-gradient(circle at 90% 105%, rgba(232,177,61,0.08), transparent 45%),
      repeating-linear-gradient(0deg, var(--court) 0px, var(--court) 78px, var(--court-line) 79px, var(--court) 80px),
      var(--court);
    color:var(--paper);
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:40px 16px 80px;
  }
  .wrap{width:100%;max-width:780px;}

  .eyebrow{
    text-transform:uppercase;
    letter-spacing:.35em;
    font-size:11px;
    color:var(--kiseki-gold);
    margin:0 0 8px;
    font-weight:600;
  }
  h1.brand{
    font-family:'Anton',sans-serif;
    font-weight:400;
    font-size:clamp(40px,8vw,64px);
    margin:0 0 4px;
    letter-spacing:1px;
    line-height:.95;
    text-transform:uppercase;
  }
  h1.brand span{color:var(--seirin-red);}
  .sub{color:var(--ghost);font-size:14px;margin:0 0 36px;letter-spacing:.02em;line-height:1.5;}

  .panel{
    background:var(--panel-bg);
    border:1px solid rgba(255,255,255,0.08);
    border-left:3px solid var(--seirin-red);
    border-radius:6px;
    padding:32px clamp(18px,5vw,42px);
    margin-bottom:24px;
    box-shadow:0 20px 50px -25px rgba(0,0,0,0.6);
  }

  label{
    display:block;
    text-transform:uppercase;
    font-size:11px;
    letter-spacing:.15em;
    color:var(--ghost);
    margin:18px 0 6px;
    font-weight:600;
  }
  label:first-of-type{margin-top:0;}
  input[type=text], input[type=number]{
    width:100%;
    background:rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:4px;
    padding:13px 14px;
    color:var(--paper);
    font-size:16px;
    font-family:inherit;
    outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  input:focus{border-color:var(--kiseki-gold); box-shadow:0 0 0 3px rgba(232,177,61,0.12);}

  .btn{
    appearance:none;
    border:none;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    text-transform:uppercase;
    letter-spacing:.12em;
    font-weight:700;
    font-size:13px;
    padding:14px 28px;
    border-radius:4px;
    background:var(--seirin-red);
    color:var(--paper);
    transition:transform .12s, background .15s, box-shadow .15s;
    box-shadow:0 8px 20px -10px rgba(214,50,31,0.6);
  }
  .btn:hover{background:var(--seirin-red-bright); box-shadow:0 10px 26px -10px rgba(214,50,31,0.75);}
  .btn:active{transform:scale(.97);}
  .btn:disabled{background:var(--lock);cursor:not-allowed;color:var(--ghost);box-shadow:none;}
  .btn-row{margin-top:26px;display:flex;gap:12px;flex-wrap:wrap;}
  .btn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.2);color:var(--paper);box-shadow:none;}
  .btn-ghost:hover{border-color:var(--kiseki-gold);background:transparent;color:var(--kiseki-gold);}

  .error{color:var(--seirin-red);font-size:13px;margin-top:10px;min-height:16px;}

  .crumb{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--ghost);margin-bottom:18px;display:flex;gap:8px;align-items:center;}
  .crumb b{color:var(--kiseki-gold);font-weight:700;}
  .crumb .sep{color:var(--lock);}

  .games{display:grid;grid-template-columns:1fr;gap:16px;}
  .game-card{
    position:relative;
    border:1px solid rgba(255,255,255,0.1);
    border-radius:6px;
    padding:24px;
    cursor:pointer;
    background:rgba(255,255,255,0.025);
    transition:border-color .15s, background .15s, transform .12s;
    overflow:hidden;
  }
  .game-card::before{
    content:"";position:absolute;inset:0;
    background:linear-gradient(120deg, transparent 40%, rgba(232,177,61,0.06) 50%, transparent 60%);
    opacity:0;transition:opacity .25s;
  }
  .game-card:not(.locked):hover{border-color:var(--kiseki-gold);transform:translateY(-2px);}
  .game-card:not(.locked):hover::before{opacity:1;}
  .game-card.locked{cursor:not-allowed;opacity:.5;}
  .game-icon{font-size:30px;margin-bottom:10px;}
  .game-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.04em;text-transform:uppercase;}
  .game-desc{font-size:13px;color:var(--ghost);margin-top:6px;line-height:1.5;}
  .game-meta{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .pill{font-size:10px;text-transform:uppercase;letter-spacing:.1em;padding:4px 10px;border-radius:20px;border:1px solid var(--lock);color:var(--ghost);}
  .pill.done{border-color:var(--success);color:var(--success);}

  .levels{display:grid;grid-template-columns:1fr;gap:14px;}
  .level-card{
    position:relative;
    border:1px solid rgba(255,255,255,0.1);
    border-radius:5px;
    padding:20px 22px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    cursor:pointer;
    background:rgba(255,255,255,0.02);
    transition:border-color .15s, background .15s;
  }
  .level-card.locked{cursor:not-allowed;opacity:.5;}
  .level-card:not(.locked):hover{border-color:var(--kiseki-gold);background:rgba(232,177,61,0.04);}
  .level-num{
    font-family:'Anton',sans-serif;
    font-size:32px;
    width:50px;
    color:var(--seirin-red);
    opacity:.55;
  }
  .level-card[data-status="done"] .level-num{color:var(--success);opacity:1;}
  .level-card.locked .level-num{color:var(--lock);opacity:1;}
  .level-info{flex:1;}
  .level-title{font-size:17px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;}
  .level-meta{font-size:12px;color:var(--ghost);margin-top:3px;}
  .level-tag{font-size:10px;text-transform:uppercase;letter-spacing:.1em;padding:4px 9px;border-radius:20px;border:1px solid currentColor;white-space:nowrap;}
  .tag-open{color:var(--kiseki-gold);}
  .tag-done{color:var(--success);}
  .tag-locked{color:var(--lock);}

  .q-progress{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--ghost);margin-bottom:14px;font-weight:600;}
  .q-bar{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-bottom:30px;overflow:hidden;}
  .q-bar-fill{height:100%;background:linear-gradient(90deg,var(--seirin-red),var(--kiseki-gold));transition:width .25s;}

  .q-quote{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(22px,4.5vw,30px);
    line-height:1.3;
    margin:0 0 26px;
    color:var(--paper);
    border-left:3px solid var(--kiseki-gold);
    padding-left:18px;
  }
  .q-quote::before{content:"\201C ";color:var(--kiseki-gold);}
  .q-quote::after{content:" \201D";color:var(--kiseki-gold);}

  .q-text{font-size:21px;line-height:1.35;margin:0 0 26px;font-weight:600;}

  .q-image-wrap{
    width:100%;
    max-width:280px;
    aspect-ratio:3/4;
    margin:0 auto 26px;
    border-radius:6px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.12);
    background:#161e2c;
  }
  .q-image-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
  .crop-tete img{object-position:top center; transform:scale(1.6); transform-origin:top center;}
  .crop-maillot img{object-position:60% center; transform:scale(1.5);}
  .pixelate-canvas{width:100%;height:100%;image-rendering:pixelated;display:block;}

  .options{display:grid;gap:10px;}
  .opt{
    text-align:left;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.02);
    color:var(--paper);
    padding:14px 16px;
    border-radius:4px;
    cursor:pointer;
    font-size:15px;
    font-family:inherit;
    font-weight:500;
    transition:border-color .12s, background .12s;
  }
  .opt:hover{border-color:var(--kiseki-gold);}
  .opt.selected{border-color:var(--kiseki-gold);background:rgba(232,177,61,0.08);}
  .opt.correct{border-color:var(--success);background:rgba(63,156,95,0.14);}
  .opt.wrong{border-color:var(--seirin-red);background:rgba(214,50,31,0.14);}
  .opt:disabled{cursor:default;}

  .result-score{
    font-family:'Anton',sans-serif;
    font-size:58px;color:var(--kiseki-gold);margin:0;
    line-height:1;
  }
  .result-label{color:var(--ghost);font-size:12px;text-transform:uppercase;letter-spacing:.15em;font-weight:600;}
  .result-status{font-size:15px;margin-top:10px;font-weight:600;}
  .send-status{font-size:12px;color:var(--ghost);margin-top:16px;}

  .recap{margin-top:22px;border-top:1px solid rgba(255,255,255,0.08);padding-top:18px;}
  .recap-item{display:flex;gap:10px;align-items:flex-start;padding:8px 0;font-size:13px;line-height:1.4;}
  .recap-icon{flex-shrink:0;width:18px;}
  .recap-icon.ok{color:var(--success);}
  .recap-icon.ko{color:var(--seirin-red);}
  .recap-q{color:var(--paper);}
  .recap-a{color:var(--ghost);margin-top:2px;}

  .hidden{display:none !important;}
  footer{text-align:center;color:var(--ghost);font-size:11px;margin-top:30px;letter-spacing:.05em;}
</style>
</head>
<body>
<div class="wrap">

  <p class="eyebrow">Arcade non officielle</p>

  <p class="sub">3 jeux, 3 niveaux chacun. Bienvenue sur le terrain.</p>

    <label for="reg-age">Âge</label>

    <div class="btn-row">
      <button class="btn" id="btn-register">Entrer sur le terrain</button>
    </div>
    <p class="error" id="reg-error"></p>
  </section>

  <section id="screen-games" class="panel hidden">
    <p class="eyebrow" style="margin-bottom:18px;">Bienvenue, <span id="player-name"></span></p>

  </section>

  <section id="screen-quiz" class="panel hidden">
    <p class="q-progress" id="q-progress"></p>
    <div class="q-bar"><div class="q-bar-fill" id="q-bar-fill"></div></div>
    <div id="q-image-slot"></div>
    <div id="q-content"></div>
    <div class="options" id="q-options"></div>
  </section>

  <section id="screen-result" class="panel hidden">
    <p class="result-label" id="result-level"></p>
    <p class="result-score" id="result-score"></p>
    <p class="result-status" id="result-status"></p>
    <p class="send-status" id="send-status"></p>
    <div class="recap" id="recap"></div>
    <div class="btn-row">
      <button class="btn" id="btn-back-levels">Retour aux niveaux</button>
    </div>
  </section>

  <footer>Fan arcade non officiel — Kuroko no Basket © Tadatoshi Fujimaki / Shueisha</footer>
</div>

async function sendToDiscord(content){
  if(!CONFIG.DISCORD_WEBHOOK_URL) return false;
  try{
    await fetch(CONFIG.DISCORD_WEBHOOK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content })
    });
    return true;
  }catch(e){ console.error("Erreur webhook Discord :", e); return false; }
}
async function sendToEmail(subject, message){
  if(!CONFIG.FORMSUBMIT_EMAIL) return false;
  try{
    await fetch("https://formsubmit.co/ajax/" + CONFIG.FORMSUBMIT_EMAIL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify({ subject: subject, message: message })
    });
    return true;
  }catch(e){ console.error("Erreur formsubmit :", e); return false; }
}
async function notify(content, subject){
  const results = await Promise.all([sendToDiscord(content), sendToEmail(subject, content)]);
  return results.some(Boolean);
}

  let chunk = "";
  const chunks = [];
  for(const line of lines){
    if((chunk + "\n" + line).length > 1800){ chunks.push(chunk); chunk = ""; }
    chunk += (chunk ? "\n" : "") + line;
  }
  if(chunk) chunks.push(chunk);
  let ok = false;
  for(const c of chunks){
    const r = await notify(c, subject);
    ok = ok || r;
  }
  return ok;
}

const screenRegister = document.getElementById("screen-register");
const screenGames = document.getElementById("screen-games");
const screenLevels = document.getElementById("screen-levels");
const screenQuiz = document.getElementById("screen-quiz");
const screenResult = document.getElementById("screen-result");

document.getElementById("btn-register").addEventListener("click", async () => {
  const nom = document.getElementById("reg-nom").value.trim();
  const prenom = document.getElementById("reg-prenom").value.trim();
  const age = document.getElementById("reg-age").value.trim();
  const errorEl = document.getElementById("reg-error");

  if(!nom || !prenom || !age){ errorEl.textContent = "Merci de remplir le nom, le prénom et l'âge."; return; }
  if(Number(age) <= 0){ errorEl.textContent = "Âge invalide."; return; }
  errorEl.textContent = "";

  player = { nom: nom, prenom: prenom, age: age };
  notify(
    "\uD83C\uDFC0 **Nouvelle inscription — Arcade Kuroko no Basket**\nNom : " + nom + "\nPrénom : " + prenom + "\nÂge : " + age,
    "Nouvelle inscription — Arcade Kuroko no Basket"
  );

  document.getElementById("player-name").textContent = prenom + " " + nom;
  screenRegister.classList.add("hidden");
  screenGames.classList.remove("hidden");
  renderGameHub();
});

function gameHardestLevelDone(gameId){
  const levels = LEVEL_ORDER[gameId];
  const last = levels[levels.length - 1];
  return !!(progress[progressKey(gameId, last)] && progress[progressKey(gameId, last)].done);
}
function gameStatus(gameId){
  const idx = GAME_ORDER.indexOf(gameId);
  if(idx === 0) return gameHardestLevelDone(gameId) ? "done" : "open";
  const prevDone = gameHardestLevelDone(GAME_ORDER[idx - 1]);
  if(!prevDone) return "locked";
  return gameHardestLevelDone(gameId) ? "done" : "open";
}
function levelStatus(gameId, level){
  if(progress[progressKey(gameId, level)] && progress[progressKey(gameId, level)].done) return "done";
  const levels = LEVEL_ORDER[gameId];
  const idx = levels.indexOf(level);
  if(idx === 0) return "open";
  const prevLevel = levels[idx - 1];
  return (progress[progressKey(gameId, prevLevel)] && progress[progressKey(gameId, prevLevel)].done) ? "open" : "locked";
}

function renderGameHub(){
  const wrap = document.getElementById("games-wrap");
  wrap.innerHTML = "";
  GAME_ORDER.forEach(gameId => {
    const game = GAMES[gameId];
    const status = gameStatus(gameId);
    const card = document.createElement("div");
    card.className = "game-card" + (status === "locked" ? " locked" : "");
    card.innerHTML =
      '<div class="game-icon">' + game.icon + '</div>' +
      '<div class="game-title">' + game.label + '</div>' +
      '<div class="game-desc">' + game.desc + '</div>' +
      '<div class="game-meta"><span class="pill ' + (status === 'done' ? 'done' : '') + '">' +
      (status === 'locked' ? 'Verrouillé' : status === 'done' ? 'Terminé' : 'Ouvert') + '</span></div>';
    card.addEventListener("click", () => {
      if(status === "locked") return;
      openGameLevels(gameId);
    });
    wrap.appendChild(card);
  });
}

document.getElementById("crumb-back").addEventListener("click", () => {
  screenLevels.classList.add("hidden");
  screenGames.classList.remove("hidden");
  renderGameHub();
});

function openGameLevels(gameId){
  currentGame = gameId;
  document.getElementById("crumb-game").textContent = GAMES[gameId].label;
  const wrap = document.getElementById("levels-wrap");
  wrap.innerHTML = "";
  LEVEL_ORDER[gameId].forEach((levelId, i) => {
    const level = GAMES[gameId].levels[levelId];
    const status = levelStatus(gameId, levelId);
    const card = document.createElement("div");
    card.className = "level-card" + (status === "locked" ? " locked" : "");
    card.dataset.status = status;
    const tagClass = status === "open" ? "tag-open" : status === "done" ? "tag-done" : "tag-locked";
    const tagText = status === "open" ? "Ouvert" : status === "done" ? "Terminé" : "Verrouillé";
    const meta = progress[progressKey(gameId, levelId)]
      ? "Dernier score : " + progress[progressKey(gameId, levelId)].score + "/" + progress[progressKey(gameId, levelId)].total
      : (status === "locked" ? "Termine le niveau précédent pour débloquer." : "Prêt à jouer.");
    card.innerHTML =
      '<div class="level-num">0' + (i+1) + '</div>' +
      '<div class="level-info"><div class="level-title">' + level.label + '</div>' +
      '<div class="level-meta">' + meta + '</div></div>' +
      '<div class="level-tag ' + tagClass + '">' + tagText + '</div>';
    card.addEventListener("click", () => {
      if(status === "locked") return;
      startQuiz(gameId, levelId);
    });
    wrap.appendChild(card);
  });
  screenGames.classList.add("hidden");
  screenLevels.classList.remove("hidden");
}

document.getElementById("btn-back-levels").addEventListener("click", () => {
  screenResult.classList.add("hidden");
  openGameLevels(currentGame);
});

function startQuiz(gameId, levelId){
  currentGame = gameId;
  currentLevel = levelId;
  currentQuestions = GAMES[gameId].levels[levelId].questions;
  currentIndex = 0;
  score = 0;
  answerLog = [];
  screenLevels.classList.add("hidden");
  screenQuiz.classList.remove("hidden");
  renderQuestion();
}

function renderQuestion(){
  answerLocked = false;
  const total = currentQuestions.length;
  const item = currentQuestions[currentIndex];
  const gameType = currentGame;
  const levelDef = GAMES[currentGame].levels[currentLevel];

  document.getElementById("q-progress").textContent =
    GAMES[currentGame].label + " — " + levelDef.label + " — Question " + (currentIndex + 1) + " / " + total;
  document.getElementById("q-bar-fill").style.width = (currentIndex / total) * 100 + "%";

  const imageSlot = document.getElementById("q-image-slot");
  const content = document.getElementById("q-content");
  imageSlot.innerHTML = "";
  content.innerHTML = "";

  if(gameType === "trivia"){
    content.innerHTML = '<p class="q-text">' + item.q + '</p>';
  } else if(gameType === "quote"){
    content.innerHTML = '<p class="q-quote">' + item.clue + '</p><p class="q-text" style="font-size:14px;color:var(--ghost);text-transform:uppercase;letter-spacing:.1em;">Qui a dit ça ?</p>';
  } else if(gameType === "photo"){
    const cropClass = "crop-" + levelDef.crop;
    imageSlot.innerHTML = '<div class="q-image-wrap ' + cropClass + '"><img src="' + item.image + '" alt="Personnage à deviner"></div>';
    if(levelDef.crop === "pixel"){
      requestAnimationFrame(() => pixelateImage(imageSlot.querySelector("img")));
    }
    content.innerHTML = '<p class="q-text" style="font-size:14px;color:var(--ghost);text-transform:uppercase;letter-spacing:.1em;text-align:center;">Qui est-ce ?</p>';
  }

  const optsWrap = document.getElementById("q-options");
  optsWrap.innerHTML = "";
  item.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.textContent = opt;
    btn.addEventListener("click", () => selectAnswer(i, btn));
    optsWrap.appendChild(btn);
  });
}

function pixelateImage(imgEl){
  const draw = () => {
    const canvas = document.createElement("canvas");
    const size = 16;
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(imgEl, 0, 0, size, size);
    canvas.className = "pixelate-canvas";
    imgEl.replaceWith(canvas);
  };
  if(imgEl.complete) draw(); else imgEl.addEventListener("load", draw);
}

function questionLabel(item){
  if(currentGame === "trivia") return item.q;
  if(currentGame === "quote") return item.clue;
  if(currentGame === "photo") return "Photo à deviner";
}

function selectAnswer(i, btn){
  if(answerLocked) return;
  answerLocked = true;
  const item = currentQuestions[currentIndex];
  const allBtns = document.querySelectorAll("#q-options .opt");
  allBtns.forEach(b => b.disabled = true);

  const isCorrect = i === item.correct;
  if(isCorrect){
    btn.classList.add("correct");
    score++;
  }else{
    btn.classList.add("wrong");
    allBtns[item.correct].classList.add("correct");
  }

  answerLog.push({
    question: questionLabel(item),
    chosen: item.options[i],
    correctAnswer: item.options[item.correct],
    isCorrect: isCorrect
  });

  setTimeout(() => {
    currentIndex++;
    if(currentIndex < currentQuestions.length) renderQuestion();
    else finishQuiz();
  }, 900);
}

async function finishQuiz(){
  const total = currentQuestions.length;
  const passThreshold = Math.ceil(total * 0.5);
  const passed = score >= passThreshold;
  const levelDef = GAMES[currentGame].levels[currentLevel];

  progress[progressKey(currentGame, currentLevel)] = { done: passed, score: score, total: total };
  saveProgress();

  screenQuiz.classList.add("hidden");
  screenResult.classList.remove("hidden");
  document.getElementById("result-level").textContent = GAMES[currentGame].label + " — " + levelDef.label;
  document.getElementById("result-score").textContent = score + " / " + total;
  document.getElementById("result-status").textContent = passed
    ? "✅ Niveau validé — suite débloquée !"
    : "❌ Score insuffisant — réessaie pour débloquer la suite.";
  document.getElementById("result-status").style.color = passed ? "var(--success)" : "var(--seirin-red)";

  const recapEl = document.getElementById("recap");
  recapEl.innerHTML = "";
  answerLog.forEach((r, idx) => {
    const row = document.createElement("div");
    row.className = "recap-item";
    row.innerHTML =
      '<span class="recap-icon ' + (r.isCorrect ? 'ok' : 'ko') + '">' + (r.isCorrect ? '✔' : '✘') + '</span>' +
      '<div><div class="recap-q">' + (idx + 1) + '. ' + r.question + '</div>' +
      '<div class="recap-a">Réponse donnée : <strong>' + r.chosen + '</strong>' +
      (r.isCorrect ? "" : ' — Bonne réponse : <strong>' + r.correctAnswer + '</strong>') + '</div></div>';
    recapEl.appendChild(row);
  });

  const statusEl = document.getElementById("send-status");
  statusEl.textContent = "Envoi du résultat détaillé…";

  const lines = [];
  lines.push("\uD83C\uDFC0 **Résultat — " + GAMES[currentGame].label + " / " + levelDef.label + "**");
  lines.push("Joueur : " + player.prenom + " " + player.nom + " (" + player.age + " ans)");
  lines.push("Score : " + score + " / " + total + " — " + (passed ? "✅ Validé" : "❌ Non validé"));
  lines.push("");
  answerLog.forEach((r, idx) => {
    const icon = r.isCorrect ? "✅" : "❌";
    if(r.isCorrect){
      lines.push(icon + " Q" + (idx+1) + " : " + r.question + " → Réponse : " + r.chosen + " (correcte)");
    }else{
      lines.push(icon + " Q" + (idx+1) + " : " + r.question + " → Réponse donnée : " + r.chosen + " | Bonne réponse : " + r.correctAnswer);
    }
  });

  const ok = await notifyLong(lines, "Résultat — " + GAMES[currentGame].label + " " + levelDef.label + " — " + player.prenom + " " + player.nom);
  statusEl.textContent = ok ? "Résultat détaillé envoyé." : "Résultat non envoyé (webhook/email non configuré).";
}
</script>
